name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:    # 手动触发，无需推送也能构建

permissions:
  contents: write       # 允许创建 Release 上传 APK

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ☕ 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: 🤖 配置 Android SDK
        uses: android-actions/setup-android@v3

      - name: ⚙️ 安装 Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.4

      - name: 🔨 编译 Debug APK
        run: gradle assembleDebug

      - name: 📦 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: TaskCountdown-Debug-APK
          path: app/build/outputs/apk/debug/*.apk

      # ====== 自动创建 Release，手机可直接下载 ======
      - name: 🏷️ 创建 Release 标签
        if: github.ref == 'refs/heads/main'
        run: |
          echo "RELEASE_TAG=build-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV

      - name: 🚀 创建 Release 并上传 APK
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "APK 构建 #${{ github.run_number }}"
          body: |
            ✅ 自动构建完成

            - 构建时间：${{ github.event.repository.updated_at }}
            - 提交信息：${{ github.event.head_commit.message }}
            - 运行编号：${{ github.run_number }}

            📱 手机直接点击下方 APK 文件下载安装
          files: app/build/outputs/apk/debug/*.apk
          generate_release_notes: false
