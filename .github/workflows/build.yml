name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:    # 手动触发，无需推送也能构建

permissions:
  contents: write       # 允许创建 Release 上传 APK

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: 🤖 配置 Android SDK
        uses: android-actions/setup-android@v3

      - name: ⚙️ 安装 Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.4

      - name: 🔨 编译 Debug APK
        run: gradle assembleDebug

      - name: 📦 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: TaskCountdown-Debug-APK
          path: app/build/outputs/apk/debug/*.apk

      # ====== 自动创建 Release，手机可直接下载 ======
      - name: 🏷️ 创建 Release 标签
        if: github.ref == 'refs/heads/main'
        run: |
          echo "RELEASE_TAG=build-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV

      - name: 🚀 创建 GitHub Release 并上传 APK
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "APK 构建 #${{ github.run_number }}"
          body: |
            ✅ 自动构建完成

            - 构建时间：${{ github.event.repository.updated_at }}
            - 提交信息：${{ github.event.head_commit.message }}
            - 运行编号：${{ github.run_number }}

            📱 手机直接点击下方 APK 文件下载安装
          files: app/build/outputs/apk/debug/*.apk
          generate_release_notes: false

      # ====== 同步到 Gitee（国内用户高速下载）======
      # 通过 Gitee Releases API 上传 APK 附件
      # public repo 的 Release 附件下载不需要登录
      - name: 🚀 同步 APK 到 Gitee
        if: github.ref == 'refs/heads/main' && env.GITEE_TOKEN != ''
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          APK_PATH=$(ls app/build/outputs/apk/debug/*.apk 2>/dev/null | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ 未找到 APK 文件"
            exit 1
          fi
          echo "✅ 找到 APK: $APK_PATH"

          GITEE_REPO="lvjianshan/task-countdown-app"
          TAG="v${{ github.run_number }}"
          API_BASE="https://gitee.com/api/v5/repos/$GITEE_REPO"

          # 推送 tag 到 Gitee（Release 需要先有 tag）
          git config user.name "LvJianshan"
          git config user.email "lvjianshan@users.noreply.github.com"
          GITEE_URL="https://oauth2:${GITEE_TOKEN}@gitee.com/${GITEE_REPO}.git"
          git remote add gitee "$GITEE_URL" 2>/dev/null || git remote set-url gitee "$GITEE_URL"
          git tag -f "$TAG"
          git push -f gitee "$TAG" 2>&1
          echo "✅ tag $TAG 推送成功"

          # 删除旧 Release（如果存在）
          curl -s -X DELETE "$API_BASE/releases/tags/$TAG?access_token=$GITEE_TOKEN" -o /dev/null

          # 创建 Release
          echo "📤 创建 Gitee Release..."
          CREATE_RESP=$(curl -s -X POST "$API_BASE/releases?access_token=$GITEE_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\": \"$TAG\", \"name\": \"APK 构建 #${{ github.run_number }}\", \"body\": \"✅ 自动构建 #${{ github.run_number }}\\n📱 下方 APK 文件可直接下载安装\"}")

          RELEASE_ID=$(echo "$CREATE_RESP" | jq -r '.id // ""' 2>/dev/null)

          if [ -z "$RELEASE_ID" ]; then
            echo "⚠️ 创建失败，尝试获取现有 Release..."
            RELEASE_ID=$(curl -s "$API_BASE/releases/tags/$TAG?access_token=$GITEE_TOKEN" | jq -r '.id // ""' 2>/dev/null)
          fi

          if [ -z "$RELEASE_ID" ]; then
            echo "❌ 无法创建/获取 Release，API 响应:"
            echo "$CREATE_RESP" | head -c 300
            exit 1
          fi

          echo "✅ Release ID: $RELEASE_ID"

          # 上传 APK 附件
          echo "📤 上传 APK 附件..."
          UPLOAD_RESP=$(curl -s -X POST "$API_BASE/releases/$RELEASE_ID/attach_files?access_token=$GITEE_TOKEN" \
            -F "file=@$APK_PATH")

          UPLOAD_ID=$(echo "$UPLOAD_RESP" | jq -r '.id // ""' 2>/dev/null)

          if [ -n "$UPLOAD_ID" ] && [ "$UPLOAD_ID" != "null" ]; then
            echo "🎉 APK 上传成功！"
          else
            echo "⚠️ APK 上传失败: $(echo "$UPLOAD_RESP" | head -c 200)"
          fi

          echo ""
          echo "============================================"
          echo "📱 Gitee 下载地址（手机浏览器打开）："
          echo "   https://gitee.com/$GITEE_REPO/releases/$TAG"
          echo "============================================"
