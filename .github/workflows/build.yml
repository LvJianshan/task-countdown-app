name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:    # 手动触发，无需推送也能构建

permissions:
  contents: write       # 允许创建 Release 上传 APK

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: 🤖 配置 Android SDK
        uses: android-actions/setup-android@v3

      - name: ⚙️ 安装 Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.4

      - name: 🔨 编译 Debug APK
        run: gradle assembleDebug

      - name: 📦 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: TaskCountdown-Debug-APK
          path: app/build/outputs/apk/debug/*.apk

      # ====== 自动创建 Release，手机可直接下载 ======
      - name: 🏷️ 创建 Release 标签
        if: github.ref == 'refs/heads/main'
        run: |
          echo "RELEASE_TAG=build-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV

      - name: 🚀 创建 GitHub Release 并上传 APK
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "APK 构建 #${{ github.run_number }}"
          body: |
            ✅ 自动构建完成

            - 构建时间：${{ github.event.repository.updated_at }}
            - 提交信息：${{ github.event.head_commit.message }}
            - 运行编号：${{ github.run_number }}

            📱 手机直接点击下方 APK 文件下载安装
          files: app/build/outputs/apk/debug/*.apk
          generate_release_notes: false

      # ====== 同步到 Gitee（国内用户高速下载）======
      - name: 🚀 同步 APK 到 Gitee
        if: github.ref == 'refs/heads/main' && env.GITEE_TOKEN != ''
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          APK_PATH=$(ls app/build/outputs/apk/debug/*.apk 2>/dev/null | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ 未找到 APK 文件"
            exit 1
          fi
          echo "✅ 找到 APK: $APK_PATH"

          GITEE_REPO="lvjianshan/task-countdown-app"
          TAG="v${{ github.run_number }}"
          DOWNLOAD_BRANCH="downloads"
          VERSIONED_NAME="task-countdown-${{ github.run_number }}.apk"

          # 保存 APK 到临时目录
          mkdir -p /tmp/apk-dist
          cp "$APK_PATH" "/tmp/apk-dist/$VERSIONED_NAME"
          cp "$APK_PATH" "/tmp/apk-dist/task-countdown-latest.apk"
          echo "✅ APK 已暂存到 /tmp/apk-dist/"

          # 配置 Gitee 远程
          git config user.name "LvJianshan"
          git config user.email "lvjianshan@users.noreply.github.com"
          GITEE_URL="https://oauth2:${GITEE_TOKEN}@gitee.com/${GITEE_REPO}.git"
          git remote add gitee "$GITEE_URL" 2>/dev/null || git remote set-url gitee "$GITEE_URL"

          # 推送 tag
          git tag -f "$TAG"
          git push -f gitee "$TAG" 2>&1
          echo "✅ tag $TAG 推送成功"

          # 准备 downloads 分支（在临时目录用新 clone，避免干扰主分支）
          rm -rf /tmp/gitee-publish
          git clone --branch main --single-branch "$GITEE_URL" /tmp/gitee-publish 2>/dev/null || \
            git clone "$GITEE_URL" /tmp/gitee-publish
          cd /tmp/gitee-publish

          # 设置 git 用户信息
          git config user.name "LvJianshan"
          git config user.email "lvjianshan@users.noreply.github.com"

          # 切换到 downloads 分支（或新建 orphan）
          if git ls-remote origin "$DOWNLOAD_BRANCH" | grep -q .; then
            git fetch origin "$DOWNLOAD_BRANCH"
            git checkout -B "$DOWNLOAD_BRANCH" "origin/$DOWNLOAD_BRANCH"
            git rm -f apk/*.apk 2>/dev/null || true
          else
            git checkout --orphan "$DOWNLOAD_BRANCH"
            git rm -rf . 2>/dev/null || true
          fi

          # 放入 APK
          mkdir -p apk
          cp "/tmp/apk-dist/$VERSIONED_NAME" "apk/$VERSIONED_NAME"
          cp "/tmp/apk-dist/task-countdown-latest.apk" "apk/task-countdown-latest.apk"

          # 简洁下载页
          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head><meta charset="UTF-8"><title>任务倒计时 App 下载</title>
          <meta name="viewport" content="width=device-width, initial-scale=1.0"></head>
          <body style="font-family:-apple-system,sans-serif;max-width:600px;margin:80px auto;padding:20px;background:#1a1a2e;color:#fff;text-align:center">
            <h1>📱 任务倒计时 App</h1>
            <p style="color:#8899aa">Android 倒计时任务管理工具</p>
            <a href="./apk/task-countdown-latest.apk" style="display:block;padding:18px;margin:30px 0;background:#2196F3;color:#fff;border-radius:14px;text-decoration:none;font-size:22px;font-weight:bold">📥 下载 APK</a>
            <p style="color:#556677;font-size:14px">下载后点击文件直接安装<br>如提示未知来源，请允许安装</p>
          </body></html>
          EOF

          git add apk/ index.html
          git commit -m "发布 APK 构建 #${{ github.run_number }}"
          git push -f origin "$DOWNLOAD_BRANCH"

          echo ""
          echo "============================================"
          echo "✅ APK 发布到 Gitee 成功！"
          echo ""
          echo "📱 手机浏览器打开这个链接下载："
          echo "   https://gitee.com/$GITEE_REPO/raw/$DOWNLOAD_BRANCH/index.html"
          echo "============================================"
