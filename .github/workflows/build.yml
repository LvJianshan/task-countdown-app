name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:    # 手动触发，无需推送也能构建

permissions:
  contents: write       # 允许创建 Release 上传 APK

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: 🤖 配置 Android SDK
        uses: android-actions/setup-android@v3

      - name: ⚙️ 安装 Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.4

      - name: 🔨 编译 Debug APK
        run: gradle assembleDebug

      - name: 📦 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: TaskCountdown-Debug-APK
          path: app/build/outputs/apk/debug/*.apk

      # ====== 自动创建 Release，手机可直接下载 ======
      - name: 🏷️ 创建 Release 标签
        if: github.ref == 'refs/heads/main'
        run: |
          echo "RELEASE_TAG=build-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV

      - name: 🚀 创建 GitHub Release 并上传 APK
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "APK 构建 #${{ github.run_number }}"
          body: |
            ✅ 自动构建完成

            - 构建时间：${{ github.event.repository.updated_at }}
            - 提交信息：${{ github.event.head_commit.message }}
            - 运行编号：${{ github.run_number }}

            📱 手机直接点击下方 APK 文件下载安装
          files: app/build/outputs/apk/debug/*.apk
          generate_release_notes: false

      # ====== 同步上传到 Gitee Releases（国内用户高速下载）======
      - name: 🚀 上传到 Gitee Release
        if: github.ref == 'refs/heads/main' && env.GITEE_TOKEN != ''
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          # 查找 APK 文件
          APK_PATH=$(ls app/build/outputs/apk/debug/*.apk 2>/dev/null | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ 未找到 APK 文件"
            exit 1
          fi
          echo "✅ 找到 APK: $APK_PATH"

          # 配置 git
          git config user.name "LvJianshan"
          git config user.email "lvjianshan@users.noreply.github.com"

          GITEE_REPO="lvjianshan/task-countdown-app"
          TAG="build-${{ github.run_number }}"
          GITEE_URL="https://oauth2:${GITEE_TOKEN}@gitee.com/${GITEE_REPO}.git"

          # 配置 git 推送 Gitee
          git remote add gitee "$GITEE_URL" 2>/dev/null || git remote set-url gitee "$GITEE_URL"

          # 创建 tag 并推送到 Gitee（Gitee Release 需要先有 tag）
          echo "🏷️ 创建 tag: $TAG"
          git tag -f "$TAG"
          git push -f gitee "$TAG" 2>&1 || echo "⚠️ tag 推送失败，继续尝试..."

          # 获取文件大小
          APK_SIZE=$(stat -c%s "$APK_PATH")

          # 尝试删除旧的同名 Release
          curl -s -X DELETE \
            "https://gitee.com/api/v5/repos/$GITEE_REPO/releases/tags/$TAG?access_token=$GITEE_TOKEN" \
            -o /dev/null -w ""

          # 创建 Gitee Release
          echo "📤 正在创建 Gitee Release..."
          CREATE_RESP=$(curl -s -X POST \
            "https://gitee.com/api/v5/repos/$GITEE_REPO/releases" \
            -H "Content-Type: application/json" \
            -d "{
              \"access_token\": \"$GITEE_TOKEN\",
              \"tag_name\": \"$TAG\",
              \"name\": \"APK 构建 #${{ github.run_number }}\",
              \"body\": \"✅ 自动构建 #${{ github.run_number }} ($(date '+%Y-%m-%d %H:%M'))\n📱 点击下方 APK 文件下载安装\n⚡ 国内高速下载\"
            }")

          echo "📋 创建响应: $(echo $CREATE_RESP | head -c 200)"

          RELEASE_ID=$(echo "$CREATE_RESP" | jq -r '.id // ""' 2>/dev/null)

          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            # 可能已存在，获取现有 Release
            echo "⚠️ 创建失败，查找现有 Release..."
            RELEASE_ID=$(curl -s \
              "https://gitee.com/api/v5/repos/$GITEE_REPO/releases/tags/$TAG?access_token=$GITEE_TOKEN" \
              | jq -r '.id // ""' 2>/dev/null)
          fi

          if [ -n "$RELEASE_ID" ] && [ "$RELEASE_ID" != "null" ]; then
            echo "✅ Release ID: $RELEASE_ID"

            # 上传 APK
            echo "📤 正在上传 APK 到 Gitee..."
            UPLOAD_RESP=$(curl -s -X POST \
              "https://gitee.com/api/v5/repos/$GITEE_REPO/releases/$RELEASE_ID/attach_files" \
              -F "access_token=$GITEE_TOKEN" \
              -F "file=@$APK_PATH")

            UPLOAD_ID=$(echo "$UPLOAD_RESP" | jq -r '.id // ""' 2>/dev/null)
            if [ -n "$UPLOAD_ID" ] && [ "$UPLOAD_ID" != "null" ]; then
              echo "✅ APK 上传到 Gitee 成功！"
              echo "📥 下载地址：https://gitee.com/$GITEE_REPO/releases/$TAG"
            else
              echo "⚠️ 上传结果: $(echo $UPLOAD_RESP | head -c 300)"
            fi
          else
            echo "❌ 无法获取 Release ID"
            echo "创建响应: $CREATE_RESP"
          fi
